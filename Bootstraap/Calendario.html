<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .dropdown-menu {
            width: 900px; /* Ajusta el ancho del menú desplegable */
        }
        
        .canlendar-container {
            width: 40px; /* Ajusta el ancho del contenedor del calendario */
            height: 40px; /* Ajusta la altura del contenedor del calendario */
        }
    </style>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 
            'FILL' 0, 
            'wght' 400, 
            'GRAD' 0, 
            'opsz' 24;
        }
    </style>
</head>
<body>
    <div class="drowpdow">
        <button class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" data-bs-auto-close="outside">
            Select your date
        </button>

        <div class="dropdown-menu" p-4 fw.bold> 
            <h4 class="text-center">
                Select a date
            </h4>
        </div>

        <div class="row py-3">
            <div class="col d-flex align-items-center gap-2">
                <!-- Contenido del calendario -->
                 <button class="btn btn-outline-secundarry d-flex">
                    <span class="material-symbols-outlined">
                        cheveron_left
                    </span>
                    <span>September 2026</span>
                </button>
            </div>
        </div>

        <div class="col d-flex justify-content-end aling-items-center gap-2">
            <span>October 2026</span>
            <button class="btn btn-outline-secundary d-flex">
                <span class="material-symbols-outlined">
                    cheveron_right
                </span>
            </button>
        </div>
    </div>

</body>
</html>
