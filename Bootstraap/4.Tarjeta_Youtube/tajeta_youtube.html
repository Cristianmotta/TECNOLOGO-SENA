<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Youtube card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                "FILL" 0,
                "wght" 400,
                "GRAD" 0,
                "opsz" 48;
        }

        .action-buttons {
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.4s ease;
        }

        .card {
            transform: scale(1);
            transition: transform 0.1s ease;
        }

        .card:hover {
            transform: scale(1.1);
            z-index: 100;
        }

        .card:hover .action-buttons {
            max-height: 100px;
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container my-5 d-flex gap-1 align-items-start">
        <div class="card text-white text-bg-dark border-0 "style="width: 25rem">
            <a href="#" class="text-light text-decoration-none">
            <img src="../oz.jpg" alt="" class="card-img-top" />
            </a>

            <div class="card-body">
                <div class="row">
                    <div class="col-2">
                        <a href="#">
                            <img src="../mujer.jpg" alt="" width="48" class="rounded-circle" />
                        </a>
                    </div>
                    <div class="col-10">
                        <div class="card-title">
                            <a href="#" class="text-light text-decoration-none">
                                Dios y libertad ❤️‍🔥- Corazon
                            </a>
                        </div>
                        <div class="card-title">
                            <a href="#" class="text-light text-decoration-none opacity-50">
                                Yeni Bolaños
                            </a>
                            <div class="text-light opacity-50"> 259,000 vistas - 1 day </div>
                        </div>
                        <div>
                        </div>
                    </div>
                </div>

                <div class="row action-buttons p-2 overflow-hidden">
                    <div class="col-6 p-1">
                        <a href="#" class="btn text-secondary w-100 fw-bold d-block fs-6">
                            VER MAS TARDE
                        </a>
                    </div>
                    <div class="col-6 p-1">
                        <a href="#" class="btn text-secondary w-100 fw-bold d-block fs-6">
                            AGREGAR A LA FILA 
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="card text-white text-bg-dark border-0 "style="width: 35rem">
            <a href="#" class="text-light text-decoration-none">
            <img src="../oz.jpg" alt="" class="card-img-top" />
            </a>

            <div class="card-body">
                <div class="row">
                    <div class="col-2">
                        <a href="#">
                            <img src="../mujer.jpg" alt="" width="48" class="rounded-circle" />
                        </a>
                    </div>
                    <div class="col-10">
                        <div class="card-title">
                            <a href="#" class="text-light text-decoration-none">
                                Mujer amante ❤️‍🔥- Rata blanca
                            </a>
                        </div>
                        <div class="card-title">
                            <a href="#" class="text-light text-decoration-none opacity-50">
                                Yeni Bolaños
                            </a>
                            <div class="text-light opacity-50"> 259,000 vistas - 1 day </div>
                        </div>
                        <div>
                        </div>
                    </div>
                </div>

                <div class="row action-buttons p-2 overflow-hidden">
                    <div class="col-6 p-1">
                        <a href="#" class="btn text-secondary w-100 fw-bold d-block fs-6">
                            VER MAS TARDE
                        </a>
                    </div>
                    <div class="col-6 p-1">
                        <a href="#" class="btn text-secondary w-100 fw-bold d-block fs-6">
                            AGREGAR A LA FILA 
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
    </script>
</body>

</html>
