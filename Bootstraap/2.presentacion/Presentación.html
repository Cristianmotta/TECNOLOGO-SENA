<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
  </head>
  <body>
    <div class="d-flex justify-content-center my-5">
        <div class="card">
            <img src="" alt="" class="card-img-top">
            <div class="card-body text-center">
                <div class="positio-relative profile">
                    <img src="" alt="" class="rounded-circle">
                </div>
                <h5 class="card-title">Kahy Lewonsky</h5>
                <p class="card_text">Lorem ipsum dolor, sit amet consectetur adipisicing elit. 
                    Labore ex, delectus hic unde optio facilis modi.
                </p>
                <a href="" class="btn btn-primary">Ver perfil</a>
            </div>

            <div class="list-group list-group-flush">
                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined"> chat </span>
                    <span>Go to Messages</span>
                </a>

                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined"> notifications </span>
                    <span>Notifications</span>
                    <span class="badge bg-danger">+99</span>
                </a>

                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined">chat</span>
                    Go to Messages
                </a>

                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined">chat</span>
                    Go to Messages
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
