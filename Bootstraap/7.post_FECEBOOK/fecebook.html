<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Fecebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous" />
</head>

<body>
    <div class="post-container container-sm mt-5 border border-bottom-0   p-0 bg-white rounded overflow-hidden" style="width: 500px;">
        
        <div class="post">
            <div class="header row d-flex p-3 pb-1 align-items-center">
            <div class="col-auto perfil p-0">
                <a href="#">
                    <img src="../img/images.jpg" width="52" alt="" class="rounded-circle ps2">
                </a>
            </div>

            <div class="col post-info">
                <div class="username">
                    <a href="" class="fw-bold link-dark text-decoration-none">
                        Mark Zuckerberg
                    </a> en
                    <a href="" class="link-secondary text-decoration-none">
                        Fecebook HQ
                    </a>
                </div>
                <div class="date-location">
                    <span class="fw-bold text-secondary">20h</span>
                    <span>Paris</span>
                </div>
            </div>

                <div class="content">
                    <div class="text p-3 pt-1">
                        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Obcaecati a aliquid facilis, molestias
                        laudantium ducimus enim dolores doloremque nobis, velit, repudiandae inventore nulla? Unde veniam, quo
                        esse nam eaque perferendis!
                    </div>
                    <div class="images container-sm text-center" 
                    style="height: 600px; background-color: brown;">
                
                <img src="../img/bonita-imagen.jpg" alt="" class="h-100" style="object-fit: cover;">
                </div>
                </div>

                <div class="interactions d-flex justify-content-between p-2 px-3">
                    <div class="reactions d-flex align-items-center text-secondary">

                        <img src="../img/heart.png" width="16" alt="">
                        <img src="../img/like.png" 
                            width="16"
                            class="position-relative"
                            style="margin-left: -5px;"
                            alt="">
                        <a href="#" class="text-secondary text-decoration-none">256k</a>
            
                    </div>

                    <div class="comments-count d-flex gap-2">
                        <a href="" class="text-secondary text-decoration-none">
                            24k comments
                        </a>
                        <a href="" class="text-secondary text-decoration-none">
                            3.2 shared
                        </a>
                    </div>

                    
                
                </div>

                <div class="actions d-flex">
                    <button class="buttons btn btn-outline-light text-black-d-block w-50 text-center border rounded-0 border-start-0 p-2">
                        Like
                    </button>
                    <button class="buttons btn btn-outline-light text-black-d-block w-50 text-center border rounded-0 border-start-0 p-2">
                        comment
                    </button>
                </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa"
        crossorigin="anonymous"></script>
</body>

</html>
