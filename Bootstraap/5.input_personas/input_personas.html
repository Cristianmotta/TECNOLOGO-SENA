<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>people input</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <style>
        .input-people .input-text {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>

<body>
    <div class="container w-50 my-5">
        <div class="input-people border border-dark rounded-1 p-2 d-flex align-items-center gap-1">
            
            <div class="people">
                <div class="btn-group">
                    <button class="btn btn-outline-secondary border-end-0 d-flex align-items-center gap-1">
                        <img src="../img/images.jpg" width="32" height="32" alt="" class="rounded-circle border border-3 border-success" />
                        Cristian Motta
                    </button>
                    <button type="button" data-bs-toggle="dropdown" aria-expanded="false"
                        class="btn btn-outline-secondary dropdown-toggle dropdown-toggle-split border-start-0">
                        <span class="visually-hidden">Toggle Dropdown</span>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a href="#" class="dropdown-item">Open info card</a></li>
                        <li><a href="#" class="dropdown-item">Move to CC</a></li>
                        <li><hr class="dropdown-divider" /></li>
                        <li><a href="#" class="dropdown-item">Remove</a></li>
                    </ul>
                </div>
            </div>

            <div class="people">
                <div class="btn-group">
                    <button class="btn btn-outline-secondary border-end-0 d-flex align-items-center gap-1">
                        <img src="../img/bonita-imagen.jpg" width="32" height="32" alt="" class="rounded-circle border border-3 border-success" />
                        Juliana perez
                    </button>
                    <button type="button" data-bs-toggle="dropdown" aria-expanded="false"
                        class="btn btn-outline-secondary dropdown-toggle dropdown-toggle-split border-start-0">
                        <span class="visually-hidden">Toggle Dropdown</span>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a href="#" class="dropdown-item">Open info card</a></li>
                        <li><a href="#" class="dropdown-item">Move to CC</a></li>
                        <li><hr class="dropdown-divider" /></li>
                        <li><a href="#" class="dropdown-item">Remove</a></li>
                    </ul>
                </div>
            </div>

            <input type="text" class="form-control flex-grow-1 input-text border-0 bg-transparent" />

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
