<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet"
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <style>
    .player {
    width: 400px;
    }

    .btn-sm{
    height: 50px;
    width: 50px;
    }

    .btn-lg{
    height: 100px;
    width: 100px;
    }
    </style>

</head>

<body>
    <div class="player mx-auto border">
        <div class="cover p-3">
            <img src="../cover.jpg" alt="" class="w-100 rounded rounded-5">
            <div class="current-song text-center">
                <div class="fw-bold fs-3">Touch</div>
                <div class="text-black-50 fw-bold">Daft punk</div>
                <div>Random Access Memory</div>
            </div>


            <div class="list-group list-group-flush py-2">
                <button class="list-group-item list-group-item-action  d-flex justify-content-between">
                    <div>GIve Life Back To Life </div>
                    <div>4:34</div>
                    <button>
                    </button>
            </div>
            <div class="list-group list-group-flush py-2">
                <button class="list-group-item list-group-item-action active d-flex justify-content-between">
                    <div>Mujer amante </div>
                    <div>4:34</div>
                    <button>
                    </button>
                    <div class="list-group list-group-flush py-2">
                        <button class="list-group-item list-group-item-action d-flex justify-content-between">
                            <div>fiesta pagana</div>
                            <div>4:34</div>
                            <button>
                            </button>
                            <div class="list-group list-group-flush py-2">
                                <button class="list-group-item list-group-item-action d-flex justify-content-between">
                                    <div>Hasta que el cuerpo aguante</div>
                                    <div>4:34</div>
                                    <button>
                                    </button>
                                    <div class="list-group list-group-flush py-2">
                                        <button
                                            class="list-group-item list-group-item-action d-flex justify-content-between">
                                            <div>Una noche loca</div>
                                            <div>4:34</div>
                                            <button>
                                            </button>
                                    </div>
                                    <div class="progress my-3" style="height: 5px;">
                                        <div class="progress-bar bg-primary" role="progressbar" style="width: 75%;"
                                            aria-label="progress" aria-valuenow="75%" aria-valuemin="0"
                                            aria-valuemax="100"></div>
                                    </div>
                                    <div class="controls row  pb-3">
                                        <div class="prev col-4 d-flex justify-content-end align-items-center">
                                            <button
                                                class="btn btn-primary btn-sm rounded-circle d-flex align-items-center justify-content-center">
                                                <span class="material-symbols-outlined">
                                                    skip_next
                                                </span>
                                            </button>
                                        </div>
                                        <div class="prev col-4 d-flex justify-content-center align-items-center">
                                            <button
                                                class="btn btn-primary btn-lg rounded-circle d-flex align-items-center justify-content-center">
                                                play
                                            </button>

                                        </div>
                                        <div class="prev col-4 d-flex justify-content-start align-items-center">
                                            <button
                                                class="btn btn-primary btn-sm rounded-circle d-flex align-items-center justify-content-center">
                                                next
                                            </button>


                                            <script
                                                src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                                                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                                                crossorigin="anonymous"></script>
</body>

</html>
